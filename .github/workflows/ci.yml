name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        type: boolean
        default: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --out xml --skip-clean
      - uses: codecov/codecov-action@v6
        with:
          files: cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  micro-bench:
    name: Micro Benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --bench ferrflow_benchmarks -- --output-format bencher 2>/dev/null | tee output.txt
      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: criterion-baseline
          path: baseline/
        continue-on-error: true
      - name: Compare and comment
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          external-data-json-path: baseline/benchmark-data.json
          comment-on-alert: true
          alert-threshold: '120%'
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-always: true
      - name: Prepare baseline data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          external-data-json-path: baseline/benchmark-data.json
          save-data-file: true
      - name: Upload baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline
          path: baseline/benchmark-data.json
          retention-days: 90
          overwrite: true

  benchmark:
    name: Benchmark
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      results: ${{ steps.bench.outputs.results }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.FERRFLOW_TOKEN }}
      - name: Configure git
        run: |
          git config user.email "ferrflow-bot@users.noreply.github.com"
          git config user.name "ferrflow-bot"
          git remote set-url origin https://x-access-token:${{ secrets.FERRFLOW_TOKEN }}@github.com/${{ github.repository }}
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install hyperfine
        run: cargo install hyperfine
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Build ferrflow
        run: cargo build --release
      - name: Add ferrflow to PATH
        run: echo "$PWD/target/release" >> $GITHUB_PATH
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Generate fixtures
        run: bash benchmarks/fixtures/generate.sh benchmarks/fixtures
      - name: Run benchmarks
        id: bench
        run: |
          RESULTS=$(bash benchmarks/run.sh)
          echo "results<<BENCH_EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "BENCH_EOF" >> $GITHUB_OUTPUT
      - name: Check for regressions
        run: bash benchmarks/compare.sh benchmarks/results/baseline.json benchmarks/results/latest.json
      - name: Update baseline
        run: |
          cp benchmarks/results/latest.json benchmarks/results/baseline.json
          git add benchmarks/results/baseline.json
          git diff --cached --quiet || (git commit -m "chore(bench): update baseline" && git push)

  release:
    name: Release
    needs: [test, benchmark]
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.benchmark.result == 'success' || needs.benchmark.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.FERRFLOW_TOKEN }}
      - name: Configure git
        run: git remote set-url origin https://x-access-token:${{ secrets.FERRFLOW_TOKEN }}@github.com/${{ github.repository }}
      - uses: FerrFlow-Org/ferrflow@v0
        id: ferrflow
        with:
          dry_run: ${{ inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
      - name: Append benchmark results to release
        if: needs.benchmark.outputs.results != ''
        env:
          GH_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
        run: |
          # Find the latest release created by ferrflow
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tag found, skipping benchmark append"
            exit 0
          fi

          # Check if a release exists for this tag
          if ! gh release view "$TAG" --json tagName -q '.tagName' >/dev/null 2>&1; then
            echo "No release found for tag $TAG, skipping"
            exit 0
          fi

          # Get current release body
          CURRENT_BODY=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")

          # Append benchmark results
          BENCH_RESULTS='${{ needs.benchmark.outputs.results }}'
          if [ -n "$BENCH_RESULTS" ]; then
            NEW_BODY=$(printf '%s\n\n---\n\n## Performance\n\n%s' "$CURRENT_BODY" "$BENCH_RESULTS")
            gh release edit "$TAG" --notes "$NEW_BODY"
            echo "Benchmark results appended to release $TAG"
          fi
